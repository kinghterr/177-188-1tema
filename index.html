<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    background: #f0f0f0;
}

/* Тема 1 — все задания по абсолютному позиционированию */

.parent1 {
    position: absolute;
    width: 400px;
    height: 400px;
    border: 2px solid black;
    top: 20px;
    left: 20px;
}
.child1a {
    position: absolute;
    width: 50px;
    height: 50px;
    background: red;
    top: 0;
    right: 0;
}
.child1b {
    position: absolute;
    width: 50px;
    height: 50px;
    background: blue;
    bottom: 0;
    left: 0;
}

.parent2 {
    position: absolute;
    top: 450px;
    left: 20px;
    width: 500px;
    height: 300px;
    border: 2px solid red;
}
.child2 {
    position: absolute;
    width: 200px;
    height: 200px;
    border: 2px solid green;
    top: 0;
    left: 0;
}

.parent3 {
    position: relative;
    width: 300px;
    height: 300px;
    border: 2px solid red;
    margin: 50px auto;
    margin-top: 800px;
}
.child3a {
    position: absolute;
    width: 100px;
    height: 100px;
    border: 2px solid green;
    top: 0;
    left: 0;
}
.child3b {
    position: absolute;
    width: 100px;
    height: 100px;
    border: 2px solid green;
    top: -20px;
    left: -30px;
}

.center {
    width: 200px;
    height: 200px;
    background: green;
    margin: 50px auto;
    position: relative;
}
.red1 {
    position: absolute;
    width: 100px;
    height: 100px;
    background: red;
    top: -20px;
    left: -30px;
}
.red2 {
    position: absolute;
    width: 100px;
    height: 100px;
    background: red;
    bottom: -20px;
    right: -30px;
}
</style>
</head>
<body>

<div class="parent1">
    <div class="child1a"></div>
    <div class="child1b"></div>
</div>

<div class="parent2">
    <div class="child2"></div>
</div>

<div class="parent3">
    <div class="child3a"></div>
    <div class="child3b"></div>
</div>

<div class="center">
    <div class="red1"></div>
    <div class="red2"></div>
</div>

</body>
</html>
